<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Grover Audio Services</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:#f0f4ff;font-family:'Segoe UI',Arial,sans-serif;overscroll-behavior:none;color:#111;}
    input,select,button{font-family:inherit;}
    .hidden{display:none!important;}
    .screen{display:none;padding:12px 14px 80px;}
    .screen.active{display:block;}
    .header{background:#fff;border-bottom:2px solid #bbdefb;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(21,101,192,0.09);}
    .header-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;}
    .logo{display:flex;align-items:center;gap:10px;}
    .logo-name{font-size:15px;font-weight:800;color:#0d47a1;}
    .logo-sub{font-size:9px;color:#1565c0;letter-spacing:0.1em;text-transform:uppercase;margin-top:1px;}
    .stats-bar{display:flex;gap:6px;padding:0 12px 10px;overflow-x:auto;}
    .stat-chip{background:#fff;border-radius:10px;padding:5px 10px;display:flex;flex-direction:column;align-items:center;flex-shrink:0;min-width:52px;}
    .stat-val{font-size:16px;font-weight:800;line-height:1;}
    .stat-label{font-size:9px;color:#888;margin-top:2px;text-align:center;}
    .nav-tabs{display:flex;border-top:1px solid #e3eaff;}
    .nav-btn{flex:1;background:transparent;border:none;color:#555;padding:8px 2px;font-size:10px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;border-bottom:3px solid transparent;}
    .nav-btn.active{background:#1565c0;color:#fff;border-bottom:3px solid #0d47a1;}
    .sbar{width:100%;background:#fff;border:1.5px solid #bbdefb;border-radius:10px;color:#111;padding:10px 14px;font-size:14px;outline:none;display:block;margin-bottom:10px;}
    .vcard{background:#fff;border:1.5px solid #e3eaff;border-radius:14px;margin-bottom:10px;overflow:hidden;cursor:pointer;}
    .vcard-top{display:flex;align-items:center;padding:13px 14px 10px;gap:10px;}
    .vnum{font-weight:800;font-size:11px;color:#1565c0;background:#e3eaff;border-radius:6px;padding:3px 8px;flex-shrink:0;}
    .vname{font-size:13px;font-weight:700;color:#0d47a1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .vmeta{font-size:11px;color:#555;margin-top:2px;}
    .section{background:#fff;border-radius:12px;border:1.5px solid #e3eaff;margin-bottom:12px;padding:12px;}
    .sec-title{font-size:10px;font-weight:800;color:#1565c0;letter-spacing:0.1em;margin-bottom:10px;border-bottom:1px solid #e3eaff;padding-bottom:6px;}
    .acard{display:flex;align-items:center;gap:10px;background:#f8faff;border:1.5px solid #e3eaff;border-radius:10px;padding:10px;margin-bottom:8px;}
    .srow{display:flex;align-items:center;gap:10px;background:#f8faff;border:1.5px solid #e3eaff;border-radius:10px;padding:10px;margin-bottom:8px;cursor:pointer;touch-action:none;}
    .avatar{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
    .ename{font-size:14px;font-weight:700;color:#111;margin-bottom:2px;}
    .erole{font-size:11px;font-weight:600;}
    .drow{display:flex;align-items:center;gap:6px;margin-top:6px;}
    .dlabel{font-size:10px;color:#888;font-weight:700;}
    .tsel{background:#f0f4ff;border:1.5px solid #bbdefb;border-radius:7px;color:#0d47a1;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer;}
    .rmbtn{background:#ffebee;border:1px solid #ffcdd2;color:#c62828;border-radius:7px;width:30px;height:30px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .addbtn{background:#e3f2fd;border:1.5px solid #90caf9;color:#1565c0;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;font-weight:700;flex-shrink:0;white-space:nowrap;}
    .empty{text-align:center;color:#bbb;font-size:13px;padding:30px 20px;}
    .dheader{display:flex;align-items:flex-start;gap:10px;background:#fff;padding:12px 14px;border-bottom:1.5px solid #e3eaff;}
    .bbtn{background:#e3eaff;border:none;color:#1565c0;border-radius:8px;padding:7px 14px;font-size:14px;cursor:pointer;font-weight:600;flex-shrink:0;}
    .cbtn{background:#ffebee;border:1px solid #ffcdd2;color:#c62828;border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;font-weight:600;flex-shrink:0;}
    .dropz{margin:10px 0;background:#e8f5e9;border:2px dashed #66bb6a;border-radius:12px;padding:11px 16px;color:#1b5e20;font-size:13px;font-weight:600;text-align:center;}
    .rfilters{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:4px;}
    .rpill{background:#f0f4ff;color:#1565c0;border:1px solid #bbdefb;border-radius:20px;padding:6px 13px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0;cursor:pointer;}
    .addbox{background:#f0f4ff;border:1.5px solid #bbdefb;border-radius:12px;padding:14px;margin-bottom:14px;}
    .abtitle{font-size:12px;font-weight:800;color:#1565c0;margin-bottom:10px;}
    .ifield{width:100%;background:#fff;border:1.5px solid #bbdefb;border-radius:8px;color:#111;padding:10px 12px;font-size:14px;outline:none;margin-bottom:8px;display:block;}
    .sfield{width:100%;background:#fff;border:1.5px solid #bbdefb;border-radius:8px;color:#0d47a1;padding:10px 12px;font-size:14px;outline:none;margin-bottom:8px;display:block;}
    .abigbtn{width:100%;background:#1565c0;border:none;color:#fff;border-radius:9px;padding:12px 0;font-size:14px;font-weight:700;cursor:pointer;}
    .mrow{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid #e3eaff;border-radius:10px;padding:10px;margin-bottom:8px;}
    .delbtn{background:#ffebee;border:1px solid #ffcdd2;color:#c62828;border-radius:7px;width:34px;height:34px;cursor:pointer;font-size:16px;flex-shrink:0;}
    .stabs{display:flex;border-bottom:2px solid #e3eaff;margin-bottom:14px;}
    .stab{flex:1;background:transparent;border:none;color:#555;padding:10px 4px;font-size:11px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;}
    .stab.active{color:#fff;background:#1565c0;border-bottom:2px solid #0d47a1;}
    .lhdr{display:flex;align-items:center;gap:14px;border-radius:12px;padding:14px;margin-bottom:14px;border:1.5px solid;}
    .ltitle{font-size:18px;font-weight:800;}
    .togbtn{border-radius:8px;padding:7px 14px;cursor:pointer;font-size:12px;font-weight:700;border:1.5px solid;flex-shrink:0;}
    .phdr{background:#fff;border:1.5px solid #e3eaff;border-radius:14px;padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;border-left:5px solid #1565c0;}
    .ptitle{font-size:18px;font-weight:800;color:#0d47a1;}
    .sbox{background:#fff;border:1.5px solid #e3eaff;border-radius:12px;padding:14px;margin-bottom:14px;}
    .srow2{display:flex;justify-content:space-between;align-items:center;font-size:14px;padding:7px 0;border-bottom:1px solid #f0f4ff;}
    .pvcard{background:#fff;border:1.5px solid #e3eaff;border-left:4px solid #1565c0;border-radius:12px;padding:14px;margin-bottom:12px;}
    .pvname{font-size:15px;font-weight:800;color:#0d47a1;}
    .prow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0;}
    .pserial{color:#bbb;font-size:11px;width:20px;flex-shrink:0;font-weight:700;}
    .pdfbtn{display:block;width:100%;background:#1565c0;border:none;color:#fff;border-radius:12px;padding:15px 0;font-size:16px;font-weight:800;cursor:pointer;margin-top:16px;margin-bottom:20px;}
    .toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:24px;color:#fff;font-weight:700;font-size:13px;z-index:9999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.2);display:none;}
    .ghost{position:fixed;z-index:9999;pointer-events:none;}
  </style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="header">
  <div class="header-inner">
    <div class="logo">
      <span style="font-size:24px">🎵</span>
      <div><div class="logo-name">Grover Audio Services</div><div class="logo-sub">Staff Deployment System</div></div>
    </div>
    <input type="date" id="datepicker" style="background:#f0f4ff;border:1.5px solid #bbdefb;border-radius:8px;color:#0d47a1;padding:7px 8px;font-size:12px;outline:none;font-weight:600;"/>
  </div>
  <div class="stats-bar" id="statsbar"></div>
  <div class="nav-tabs">
    <button class="nav-btn active" id="nav-venues" onclick="gotoScreen('venues')"><span>🏨</span><span>Venues</span></button>
    <button class="nav-btn" id="nav-manage" onclick="gotoScreen('manage')"><span>⚙️</span><span>Manage</span></button>
    <button class="nav-btn" id="nav-leave" onclick="gotoScreen('leave')"><span>🌴</span><span>Leave</span></button>
    <button class="nav-btn" id="nav-office" onclick="gotoScreen('office')"><span>🏢</span><span>Office</span></button>
    <button class="nav-btn" id="nav-pdf" onclick="gotoScreen('pdf')"><span>📄</span><span>Report</span></button>
  </div>
</div>

<div class="screen active" id="screen-venues">
  <input class="sbar" id="vsearch" placeholder="Search venues..." oninput="drawVenues()"/>
  <div style="background:#e3f2fd;border:1px solid #90caf9;border-radius:8px;padding:7px 12px;font-size:11px;color:#1565c0;margin-bottom:12px;">☝️ Tap a venue to open and assign staff</div>
  <div id="vlist"></div>
</div>

<div class="screen" id="screen-detail">
  <div class="dheader">
    <button class="bbtn" onclick="gotoScreen('venues')">‹ Back</button>
    <div style="flex:1;min-width:0;"><div style="font-size:14px;font-weight:800;color:#0d47a1;line-height:1.3;" id="dtitle"></div><div style="font-size:11px;color:#1565c0;margin-top:2px;" id="dmeta"></div></div>
    <button class="cbtn" id="clearbtn" onclick="clearVenue()">Clear All</button>
  </div>
  <div style="padding:0 0 0 0;">
    <div class="dropz" id="dropzone">⬇ Drop staff here or use "+ Add" button</div>
    <div id="asection"></div>
    <div class="section">
      <div class="sec-title">ADD STAFF</div>
      <input class="sbar" id="asearch" placeholder="Search staff..." oninput="drawAddStaff()"/>
      <div class="rfilters" id="rfilters"></div>
      <div id="alist"></div>
    </div>
  </div>
</div>

<div class="screen" id="screen-manage">
  <div class="stabs">
    <button class="stab active" id="mt-staff" onclick="mtab('staff')">👥 Staff</button>
    <button class="stab" id="mt-venues" onclick="mtab('venues')">🏨 Venues</button>
    <button class="stab" id="mt-roles" onclick="mtab('roles')">🏷️ Roles</button>
  </div>
  <div id="mp-staff">
    <div class="addbox"><div class="abtitle">➕ Add New Staff</div>
      <input class="ifield" id="ns-name" placeholder="Full Name"/>
      <select class="sfield" id="ns-role"></select>
      <button class="abigbtn" onclick="doAddStaff()">+ Add Staff Member</button>
    </div>
    <input class="sbar" id="ms-search" placeholder="Search staff..." oninput="drawManageStaff()"/>
    <div id="ms-list"></div>
  </div>
  <div id="mp-venues" class="hidden">
    <div class="addbox"><div class="abtitle">➕ Add New Venue</div>
      <input class="ifield" id="nv-name" placeholder="Venue Name"/>
      <button class="abigbtn" onclick="doAddVenue()">+ Add Venue</button>
    </div>
    <input class="sbar" id="mv-search" placeholder="Search venues..." oninput="drawManageVenues()"/>
    <div id="mv-list"></div>
  </div>
  <div id="mp-roles" class="hidden">
    <div class="addbox"><div class="abtitle">➕ Add New Role</div>
      <input class="ifield" id="nr-name" placeholder="e.g. Sound Technician"/>
      <button class="abigbtn" onclick="doAddRole()">+ Add Role</button>
    </div>
    <div id="mr-list"></div>
  </div>
</div>

<div class="screen" id="screen-leave">
  <div class="lhdr" style="background:#fff5f5;border-color:#ffcdd2;"><span style="font-size:28px">🌴</span><div><div class="ltitle" style="color:#c62828;">On Leave</div><div style="font-size:13px;color:#666;" id="lcount">0 staff</div></div></div>
  <div style="display:flex;gap:8px;margin-bottom:10px;">
    <button id="ltab-a" onclick="ltab('a')" style="flex:1;padding:9px;border-radius:8px;border:1.5px solid #c62828;background:#c62828;color:#fff;font-size:12px;font-weight:700;cursor:pointer;">Available</button>
    <button id="ltab-m" onclick="ltab('m')" style="flex:1;padding:9px;border-radius:8px;border:1.5px solid #c62828;background:transparent;color:#c62828;font-size:12px;font-weight:700;cursor:pointer;">Marked</button>
  </div>
  <input class="sbar" id="lsearch" placeholder="Search staff..." oninput="drawLeave()"/>
  <div id="llist"></div>
</div>

<div class="screen" id="screen-office">
  <div class="lhdr" style="background:#fff8f0;border-color:#ffe0b2;"><span style="font-size:28px">🏢</span><div><div class="ltitle" style="color:#e65100;">In Office</div><div style="font-size:13px;color:#666;" id="ocount">0 staff</div></div></div>
  <div style="display:flex;gap:8px;margin-bottom:10px;">
    <button id="otab-a" onclick="otab('a')" style="flex:1;padding:9px;border-radius:8px;border:1.5px solid #e65100;background:#e65100;color:#fff;font-size:12px;font-weight:700;cursor:pointer;">Available</button>
    <button id="otab-m" onclick="otab('m')" style="flex:1;padding:9px;border-radius:8px;border:1.5px solid #e65100;background:transparent;color:#e65100;font-size:12px;font-weight:700;cursor:pointer;">Marked</button>
  </div>
  <input class="sbar" id="osearch" placeholder="Search staff..." oninput="drawOffice()"/>
  <div id="olist"></div>
</div>

<div class="screen" id="screen-pdf">
  <div class="phdr"><span style="font-size:30px">📋</span><div><div class="ptitle">Duty Report</div><div style="font-size:13px;color:#1565c0;font-weight:600;margin-top:2px;" id="pdf-duty"></div><div style="font-size:11px;color:#888;" id="pdf-prep"></div></div></div>
  <div class="sbox" id="pdf-summary"></div>
  <div id="pdf-body"></div>
  <button class="pdfbtn" onclick="makePDF()">⬇ Download PDF</button>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
var VENUES_INIT = [
  "The Leela Palace New Delhi","The Oberoi New Delhi","ITC Maurya New Delhi",
  "Taj Mahal Hotel New Delhi","The Imperial New Delhi","Hyatt Regency Delhi",
  "Radisson Blu Plaza Delhi Airport","Le Meridien New Delhi","The Ashok New Delhi",
  "Sheraton New Delhi Hotel","Eros Hotel New Delhi","The Suryaa New Delhi",
  "Crowne Plaza Today Okhla","JW Marriott New Delhi Aerocity","Pullman New Delhi Aerocity",
  "Novotel New Delhi Aerocity","Andaz Delhi","Aloft New Delhi Aerocity",
  "Ibis New Delhi Aerocity","Pride Plaza Hotel Aerocity","Holiday Inn New Delhi Aerocity",
  "Roseate House New Delhi","The Grand New Delhi","Shangri-La Eros New Delhi",
  "Lalit New Delhi","Hans Hotel New Delhi","The Manor New Delhi",
  "Hotel Bristol New Delhi","Jaypee Siddharth New Delhi","Vivanta New Delhi Dwarka",
  "Lemon Tree Premier New Delhi","The Westin Gurgaon","Trident Gurgaon",
  "Hyatt Place Gurgaon","Courtyard by Marriott Gurgaon","ITC Grand Bharat Gurgaon",
  "Hilton Garden Inn Gurgaon","Four Points by Sheraton Gurgaon","DoubleTree Hilton Gurgaon",
  "Le Meridien Gurgaon","Park Hyatt Gurgaon","Radisson Blu MBD Noida",
  "Crowne Plaza Greater Noida","Jaypee Greens Golf Resort Noida","The Westin Sohna Resort",
  "Vivanta Surajkund","Sheraton Saket New Delhi","Fortune Select Excalibur Gurgaon",
  "Country Inn Sahibabad","Maidens Hotel Delhi"
];

var COLORS = ["#1565c0","#6a1b9a","#0277bd","#1b5e20","#b71c1c","#880e4f","#e65100","#00695c","#33691e","#4527a0","#c62828","#4e342e","#00796b","#ad1457","#283593","#558b2f","#0288d1","#7b1fa2"];
var TIMES = ["6:00 AM","7:00 AM","8:00 AM","9:00 AM","10:00 AM","11:00 AM","12:00 PM","1:00 PM","2:00 PM","3:00 PM","4:00 PM","5:00 PM","6:00 PM","7:00 PM","8:00 PM","9:00 PM","10:00 PM","11:00 PM"];

var staff = [];
var venues = VENUES_INIT.map(function(n){ return {id:uid(),name:n}; });
var roles = ["Sound Engineer","Lighting Tech","AV Tech","Stage Manager","Camera Operator","Video Tech","Crew Lead","Setup Specialist","Live Stream Tech","Projection Tech","DJ Operator","Truss Rigger"];
var assigned = {};   // venueId -> {empId -> {emp,duty}}
var leave = {};      // empId -> {emp,duty}
var office = {};     // empId -> {emp,duty}
var curVenue = null;
var curRole = "All";
var lTab = "a";
var oTab = "a";
var mTab = "staff";

function uid(){ return "_"+Math.random().toString(36).slice(2,9); }
function cc(r){ var i=roles.indexOf(r); return COLORS[i>=0?i%COLORS.length:0]||"#1565c0"; }
function ini(n){ var p=n.trim().split(" "); return (p[0]||"?")[0].toUpperCase()+((p[1]||"")[0]||"").toUpperCase(); }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function nd(d){ var x=new Date(d); x.setDate(x.getDate()+1); return x.toISOString().slice(0,10); }
function fd(d){ return new Date(d).toLocaleDateString("en-IN",{day:"numeric",month:"long",year:"numeric"}); }
function getD(){ return document.getElementById("datepicker").value||new Date().toISOString().slice(0,10); }
function team(vid){ return Object.values(assigned[vid]||{}); }
function aids(){ var r=[]; Object.values(assigned).forEach(function(m){ Object.keys(m).forEach(function(i){ r.push(i); }); }); return r; }

// Init date
document.getElementById("datepicker").value = new Date().toISOString().slice(0,10);

// ── Toast ──────────────────────────────────────────────────────────────────────
var tt;
function toast(msg,t){
  var el=document.getElementById("toast");
  el.textContent=msg;
  el.style.background=t==="e"?"#c62828":t==="w"?"#e65100":"#1b5e20";
  el.style.display="block";
  clearTimeout(tt);
  tt=setTimeout(function(){el.style.display="none";},2500);
}

// ── Navigation ─────────────────────────────────────────────────────────────────
function gotoScreen(s){
  document.querySelectorAll(".screen").forEach(function(x){x.classList.remove("active");});
  document.querySelectorAll(".nav-btn").forEach(function(x){x.classList.remove("active");});
  document.getElementById("screen-"+s).classList.add("active");
  var nb=document.getElementById("nav-"+(s==="detail"?"venues":s));
  if(nb)nb.classList.add("active");
  if(s==="venues")drawVenues();
  if(s==="detail")drawDetail();
  if(s==="manage")drawManage();
  if(s==="leave")drawLeave();
  if(s==="office")drawOffice();
  if(s==="pdf")drawPDF();
  drawStats();
}

// ── Stats ──────────────────────────────────────────────────────────────────────
function drawStats(){
  var a=aids().length,l=Object.keys(leave).length,o=Object.keys(office).length;
  var f=Math.max(0,staff.length-a-l-o);
  var sb=document.getElementById("statsbar");
  sb.innerHTML=
    sc("Staff",staff.length,"#1565c0")+sc("Deployed",a,"#1b5e20")+
    sc("Leave",l,"#c62828")+sc("Office",o,"#e65100")+sc("Free",f,"#4527a0");
}
function sc(l,v,c){
  return '<div class="stat-chip" style="border:1.5px solid '+c+'44;">'+
    '<div class="stat-val" style="color:'+c+'">'+v+'</div>'+
    '<div class="stat-label">'+l+'</div></div>';
}

// ── Venues ─────────────────────────────────────────────────────────────────────
function drawVenues(){
  var q=(document.getElementById("vsearch")||{}).value||"";
  var el=document.getElementById("vlist");
  var fv=venues.filter(function(v){return v.name.toLowerCase().includes(q.toLowerCase());});
  if(!fv.length){el.innerHTML='<div class="empty">No venues found.</div>';return;}
  el.innerHTML=fv.map(function(v,i){
    var t=team(v.id);
    var prev=t.slice(0,4).map(function(a){
      var c=cc(a.emp.role);
      return '<span style="font-size:11px;color:'+c+';background:'+c+'18;border:1px solid '+c+'33;border-radius:5px;padding:2px 7px;">'+esc(a.emp.name.split(" ")[0])+'</span>';
    }).join("");
    if(t.length>4)prev+='<span style="font-size:11px;color:#888">+'+(t.length-4)+' more</span>';
    return '<div class="vcard" onclick="openVenue(\''+v.id+'\')">'+
      '<div class="vcard-top">'+
        '<div class="vnum">V'+(venues.indexOf(v)+1)+'</div>'+
        '<div style="flex:1;min-width:0;"><div class="vname">'+esc(v.name)+'</div>'+
        '<div class="vmeta"><span style="color:#1565c0;font-weight:700">'+t.length+'</span> staff assigned</div></div>'+
        (t.length>0?'<div style="background:#1565c0;color:#fff;border-radius:12px;padding:2px 9px;font-size:11px;font-weight:700;">'+t.length+'</div>':'')+
        '<span style="font-size:20px;color:#bbb;margin-left:4px;">›</span>'+
      '</div>'+
      (prev?'<div style="display:flex;flex-wrap:wrap;gap:5px;padding:4px 14px 12px;">'+prev+'</div>':'')+
    '</div>';
  }).join("");
}

function openVenue(id){
  curVenue=id; curRole="All";
  var el=document.getElementById("asearch"); if(el)el.value="";
  gotoScreen("detail");
}

// ── Detail ─────────────────────────────────────────────────────────────────────
function drawDetail(){
  var v=venues.find(function(x){return x.id===curVenue;}); if(!v)return;
  var t=team(curVenue);

function tsel(cur,onch){

}

function drawAddStaff(){
  var q=(document.getElementById("asearch")||{}).value||"";
  var aids_=aids(); var lids=Object.keys(leave); var oids=Object.keys(office);
  var avail=staff.filter(function(e){
    return !aids_.includes(e.id)&&!lids.includes(e.id)&&!oids.includes(e.id)&&
      e.name.toLowerCase().includes(q.toLowerCase())&&
      (curRole==="All"||e.role===curRole);

function setRole(r){curRole=r;drawDetail();}
function ud(eid,vid,val){if(assigned[vid]&&assigned[vid][eid])assigned[vid][eid].dutyTime=val;}

function addEmp(eid){
  var e=staff.find(function(x){return x.id===eid;}); if(!e||!curVenue)return;
  if(!assigned[curVenue])assigned[curVenue]={};
  Object.keys(assigned).forEach(function(vid){if(assigned[vid][eid])delete assigned[vid][eid];});
  delete leave[eid]; delete office[eid];
  assigned[curVenue][eid]={emp:e,dutyTime:"6:00 AM"};
  var v=venues.find(function(x){return x.id===curVenue;});
  toast(e.name+" → "+(v?v.name:"venue"));

// ── Make PDF ───────────────────────────────────────────────────────────────────
function makePDF(){
  var d=getD(); var ndd=nd(d);
  var lv=Object.values(leave), ov=Object.values(office);
  var activeV=venues.filter(function(v){return team(v.id).length>0;});
  if(typeof window.jspdf==="undefined"){toast("PDF library loading, try again","w");return;}
  var doc=new window.jspdf.jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  var pw=210, mg=14, y=mg;
  function cp(n){if(y+n>285){doc.addPage();y=mg;}}

  // Header bar
  doc.setFillColor(21,101,192); doc.rect(0,0,pw,28,"F");
  doc.setTextColor(255,255,255); doc.setFontSize(18); doc.setFont("helvetica","bold");
  doc.text("GROVER AUDIO SERVICES",pw/2,11,{align:"center"});
  doc.setFontSize(10); doc.setFont("helvetica","normal");
  doc.text("Staff Duty Deployment Report",pw/2,19,{align:"center"});
  y=34;

  // Duty date
  doc.setTextColor(13,71,161); doc.setFontSize(11); doc.setFont("helvetica","bold");
  doc.text("Duty Date: "+fd(ndd),mg,y);
  doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(120,120,120);
  doc.text("Prepared: "+fd(d),mg,y+6); y+=16;

  // Summary
  var aids_=aids();
  doc.setFillColor(240,244,255); doc.roundedRect(mg,y,pw-mg*2,22,3,3,"F");
  doc.setDrawColor(187,222,251); doc.roundedRect(mg,y,pw-mg*2,22,3,3,"S");
  var cols=[mg+4,62,105,148];
  var lbls=["Total Deployed","Active Venues","On Leave","In Office"];
  var vals=[aids_.length,activeV.length,lv.length,ov.length];
  var vc2=[[27,94,32],[21,101,192],[198,40,40],[230,81,0]];
  lbls.forEach(function(l,i){
    doc.setTextColor(120,120,120); doc.setFontSize(7); doc.setFont("helvetica","normal");
    doc.text(l,cols[i],y+8);
    doc.setFontSize(13); doc.setFont("helvetica","bold");
    doc.setTextColor(vc2[i][0],vc2[i][1],vc2[i][2]);
    doc.text(String(vals[i]),cols[i],y+18);
  });
  y+=30;

  // Venues
  var vcount=0;
  venues.forEach(function(v){
    var t=team(v.id); if(!t.length)return; vcount++;
    cp(22);
    doc.setFillColor(21,101,192); doc.roundedRect(mg,y,pw-mg*2,10,2,2,"F");
    doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont("helvetica","bold");
    doc.text("V"+vcount+"  "+v.name,mg+3,y+7);
    doc.text(t.length+" staff",pw-mg-3,y+7,{align:"right"});
    y+=11;
    // table header
    doc.setFillColor(227,234,255); doc.rect(mg,y,pw-mg*2,6,"F");
    doc.setTextColor(13,71,161); doc.setFontSize(7); doc.setFont("helvetica","bold");
    doc.text("#",mg+2,y+4.2); doc.text("Name",mg+10,y+4.2);
    doc.text("Role",mg+80,y+4.2); doc.text("Duty Time",pw-mg-3,y+4.2,{align:"right"});
    y+=7;
    t.forEach(function(a,i){
      cp(7);
      if(i%2===0){doc.setFillColor(248,250,255);doc.rect(mg,y,pw-mg*2,6.5,"F");}
      doc.setTextColor(50,50,50); doc.setFontSize(8); doc.setFont("helvetica","normal");
      doc.text(String(i+1),mg+2,y+4.5);
      doc.setFont("helvetica","bold"); doc.text(a.emp.name,mg+10,y+4.5);
      doc.setFont("helvetica","normal"); doc.setFontSize(7); doc.setTextColor(100,100,100);
      var roleText=a.emp.role.length>25?a.emp.role.slice(0,24)+"…":a.emp.role;
      doc.text(roleText,mg+80,y+4.5);
      doc.setTextColor(13,71,161); doc.setFont("helvetica","bold"); doc.setFontSize(8);
      doc.text(a.dutyTime,pw-mg-3,y+4.5,{align:"right"});
      y+=6.5;
    });
    y+=4;
  });

  // Leave section
  if(lv.length){
    cp(22);

// ── Touch drag ─────────────────────────────────────────────────────────────────
var dragId=null, ghost=null;
function tStart(ev,eid){
  dragId=eid; var t=ev.touches[0];
  var e=staff.find(function(x){return x.id===eid;}); if(!e)return;
  var c=cc(e.role);
  ghost=document.createElement("div"); ghost.className="ghost";
  ghost.style.left=(t.clientX-110)+"px"; ghost.style.top=(t.clientY-30)+"px";
  ghost.innerHTML='<div style="background:#fff;border:2px solid '+c+';border-radius:10px;padding:8px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 6px 24px rgba(0,0,0,0.2);font-family:sans-serif;">'+
    '<div style="width:32px;height:32px;border-radius:7px;background:'+c+'22;color:'+c+';display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;">'+ini(e.name)+'</div>'+
    '<div><div style="font-size:13px;font-weight:700;color:#111;">'+esc(e.name)+'</div><div style="font-size:10px;color:'+c+';">'+esc(e.role)+'</div></div></div>';
  document.body.appendChild(ghost);
  if(navigator.vibrate)navigator.vibrate(30);
  ev.stopPropagation();
}
document.addEventListener("touchmove",function(ev){
  if(!dragId||!ghost)return; ev.preventDefault();
  var t=ev.touches[0];
  ghost.style.left=(t.clientX-110)+"px"; ghost.style.top=(t.clientY-30)+"px";
  var dz=document.getElementById("dropzone");
  if(dz){var r=dz.getBoundingClientRect(); dz.style.background=(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom)?"#c8e6c9":"#e8f5e9";}
},{passive:false});
document.addEventListener("touchend",function(ev){
  if(!dragId){if(ghost){try{document.body.removeChild(ghost);}catch(x){}ghost=null;}return;}
  var t=ev.changedTouches[0]; var dz=document.getElementById("dropzone"); var dropped=false;
  if(dz){var r=dz.getBoundingClientRect(); if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){addEmp(dragId);dropped=true;} dz.style.background="#e8f5e9";}
  if(ghost){try{document.body.removeChild(ghost);}catch(x){}ghost=null;}
  if(dropped&&navigator.vibrate)navigator.vibrate([20,10,20]);
  dragId=null;
});
