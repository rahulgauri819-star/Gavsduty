<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Grover Audio Services</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:#f0f4ff;font-family:'Segoe UI',Arial,sans-serif;overscroll-behavior:none;color:#111;}
    input,select,button{font-family:inherit;}
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:#bbdefb;border-radius:2px;}
    .hidden{display:none!important;}
    .screen{display:none;padding:12px 14px 60px;}
    .screen.active{display:block;}
    .header{background:#fff;border-bottom:2px solid #bbdefb;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(21,101,192,0.09);}
    .header-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;}
    .logo{display:flex;align-items:center;gap:10px;}
    .logo-name{font-size:15px;font-weight:800;color:#0d47a1;line-height:1.2;}
    .logo-sub{font-size:9px;color:#1565c0;letter-spacing:0.1em;text-transform:uppercase;margin-top:1px;}
    .stats-bar{display:flex;gap:6px;padding:0 12px 10px;overflow-x:auto;}
    .stat-chip{background:#fff;border-radius:10px;padding:5px 10px;display:flex;flex-direction:column;align-items:center;flex-shrink:0;min-width:52px;}
    .stat-val{font-size:16px;font-weight:800;line-height:1;}
    .stat-label{font-size:9px;color:#888;margin-top:2px;text-align:center;}
    .nav-tabs{display:flex;border-top:1px solid #e3eaff;}
    .nav-btn{flex:1;background:transparent;border:none;color:#555;padding:8px 2px;font-size:10px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;border-bottom:3px solid transparent;}
    .nav-btn.active{background:#1565c0;color:#fff;border-bottom:3px solid #0d47a1;}
    .nav-btn .icon{font-size:16px;}
    .sbar{width:100%;background:#fff;border:1.5px solid #bbdefb;border-radius:10px;color:#111;padding:10px 14px;font-size:14px;outline:none;display:block;margin-bottom:10px;}
    .drag-tip{background:#e3f2fd;border:1px solid #90caf9;border-radius:8px;padding:7px 12px;font-size:11px;color:#1565c0;margin-bottom:12px;}
    .vcard{background:#fff;border:1.5px solid #e3eaff;border-radius:14px;margin-bottom:10px;overflow:hidden;cursor:pointer;box-shadow:0 1px 4px rgba(21,101,192,0.06);}
    .vcard-top{display:flex;align-items:center;padding:13px 14px 8px;gap:10px;}
    .vnum{font-weight:800;font-size:11px;color:#1565c0;background:#e3eaff;border-radius:6px;padding:3px 8px;flex-shrink:0;}
    .vname{font-size:13px;font-weight:700;color:#0d47a1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .vmeta{font-size:11px;color:#555;margin-top:2px;}
    .assigned-dot{background:#1565c0;color:#fff;border-radius:12px;padding:2px 9px;font-size:11px;font-weight:700;}
    .preview-row{display:flex;flex-wrap:wrap;gap:5px;padding:4px 14px 12px;}
    .preview-chip{font-size:11px;border-radius:5px;padding:2px 7px;}
    .section{background:#fff;border-radius:12px;border:1.5px solid #e3eaff;margin-bottom:12px;padding:12px;}
    .section-title{font-size:10px;font-weight:800;color:#1565c0;letter-spacing:0.1em;margin-bottom:10px;border-bottom:1px solid #e3eaff;padding-bottom:6px;}
    .assigned-card{display:flex;align-items:flex-start;gap:10px;background:#f8faff;border:1.5px solid #e3eaff;border-radius:10px;padding:10px;margin-bottom:8px;}
    .staff-row{display:flex;align-items:center;gap:10px;background:#f8faff;border:1.5px solid #e3eaff;border-radius:10px;padding:10px;margin-bottom:8px;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:none;}
    .emp-avatar{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
    .emp-name{font-size:14px;font-weight:700;color:#111;margin-bottom:2px;}
    .emp-role{font-size:11px;font-weight:600;}
    .timing-row{display:flex;align-items:center;gap:5px;margin-top:6px;flex-wrap:wrap;}
    .timing-label{font-size:10px;color:#888;font-weight:700;}
    .time-select{background:#f0f4ff;border:1.5px solid #bbdefb;border-radius:7px;color:#0d47a1;padding:4px 7px;font-size:11px;font-weight:600;cursor:pointer;}
    .rm-btn{background:#ffebee;border:1px solid #ffcdd2;color:#c62828;border-radius:7px;width:30px;height:30px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .add-btn{background:#e3f2fd;border:1.5px solid #90caf9;color:#1565c0;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;font-weight:700;flex-shrink:0;white-space:nowrap;}
    .empty{text-align:center;color:#bbb;font-size:13px;padding:30px 20px;}
    .empty-state{text-align:center;padding:50px 20px;color:#888;}
    .empty-state .ei{font-size:40px;margin-bottom:12px;}
    .empty-state .et{font-size:15px;font-weight:700;color:#1565c0;margin-bottom:6px;}
    .empty-state .es{font-size:13px;}
    .detail-header{display:flex;align-items:flex-start;gap:10px;background:#fff;padding:12px 14px;border-bottom:1.5px solid #e3eaff;margin-bottom:0;}
    .back-btn{background:#e3eaff;border:none;color:#1565c0;border-radius:8px;padding:7px 14px;font-size:14px;cursor:pointer;font-weight:600;flex-shrink:0;}
    .detail-title{font-size:14px;font-weight:800;color:#0d47a1;line-height:1.3;}
    .detail-meta{font-size:11px;color:#1565c0;margin-top:2px;}
    .clear-btn{background:#ffebee;border:1px solid #ffcdd2;color:#c62828;border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;font-weight:600;flex-shrink:0;}
    .drop-zone{margin:10px 0;background:#e8f5e9;border:2px dashed #66bb6a;border-radius:12px;padding:11px 16px;color:#1b5e20;font-size:13px;font-weight:600;text-align:center;transition:all 0.2s;}
    .drop-zone.over{background:#c8e6c9;border-color:#2e7d32;}
    .role-filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:4px;}
    .role-pill{background:#f0f4ff;color:#1565c0;border:1px solid #bbdefb;border-radius:20px;padding:6px 13px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0;cursor:pointer;}
    .role-pill.active{color:#fff;border:none;}
    .add-box{background:#f0f4ff;border:1.5px solid #bbdefb;border-radius:12px;padding:14px;margin-bottom:14px;}
    .add-box-title{font-size:12px;font-weight:800;color:#1565c0;margin-bottom:10px;}
    .input-field{width:100%;background:#fff;border:1.5px solid #bbdefb;border-radius:8px;color:#111;padding:10px 12px;font-size:14px;outline:none;margin-bottom:8px;display:block;}
    .select-field{width:100%;background:#fff;border:1.5px solid #bbdefb;border-radius:8px;color:#0d47a1;padding:10px 12px;font-size:14px;outline:none;margin-bottom:8px;display:block;}
    .add-big-btn{width:100%;background:#1565c0;border:none;color:#fff;border-radius:9px;padding:12px 0;font-size:14px;font-weight:700;cursor:pointer;}
    .manage-row{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid #e3eaff;border-radius:10px;padding:10px;margin-bottom:8px;}
    .delete-btn{background:#ffebee;border:1px solid #ffcdd2;color:#c62828;border-radius:7px;width:34px;height:34px;cursor:pointer;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
    .sub-tabs{display:flex;gap:0;border-bottom:2px solid #e3eaff;margin-bottom:14px;}
    .sub-tab{flex:1;background:transparent;border:none;color:#555;padding:10px 4px;font-size:11px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;}
    .sub-tab.active{color:#fff;background:#1565c0;border-bottom:2px solid #0d47a1;}
    .leave-header{display:flex;align-items:center;gap:14px;border-radius:12px;padding:14px;margin-bottom:14px;border:1.5px solid;}
    .leave-title{font-size:18px;font-weight:800;}
    .toggle-btn{border-radius:8px;padding:7px 14px;cursor:pointer;font-size:12px;font-weight:700;border:1.5px solid;background:transparent;flex-shrink:0;}
    .pdf-header{background:#fff;border:1.5px solid #e3eaff;border-radius:14px;padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;border-left:5px solid #1565c0;}
    .pdf-title{font-size:18px;font-weight:800;color:#0d47a1;}
    .summary-box{background:#fff;border:1.5px solid #e3eaff;border-radius:12px;padding:14px;margin-bottom:14px;}
    .summary-row{display:flex;justify-content:space-between;align-items:center;font-size:14px;padding:7px 0;border-bottom:1px solid #f0f4ff;}
    .pdf-venue-card{background:#fff;border:1.5px solid #e3eaff;border-left:4px solid #1565c0;border-radius:12px;padding:14px;margin-bottom:12px;}
    .pdf-venue-name{font-size:15px;font-weight:800;color:#0d47a1;}
    .pdf-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0f4ff;}
    .pdf-serial{color:#bbb;font-size:11px;width:20px;flex-shrink:0;font-weight:700;}
    .pdf-timing{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;gap:1px;}
    .pdf-btn{display:block;width:100%;background:#1565c0;border:none;color:#fff;border-radius:12px;padding:15px 0;font-size:16px;font-weight:800;cursor:pointer;margin-top:16px;margin-bottom:20px;}
    .toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:24px;color:#fff;font-weight:700;font-size:13px;z-index:9999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.15);display:none;}
    .ghost{position:fixed;z-index:9999;pointer-events:none;opacity:0.95;}
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div class="logo">
      <span style="font-size:26px">🎵</span>
      <div>
        <div class="logo-name">Grover Audio Services</div>
        <div class="logo-sub">Staff Deployment System</div>
      </div>
    </div>
    <input type="date" id="date-input" style="background:#f0f4ff;border:1.5px solid #bbdefb;border-radius:8px;color:#0d47a1;padding:7px 10px;font-size:12px;outline:none;font-weight:600;"/>
  </div>
  <div class="stats-bar" id="stats-bar"></div>
  <div class="nav-tabs">
    <button class="nav-btn active" onclick="goScreen('venues')" id="nav-venues"><span class="icon">🏨</span>Venues</button>
    <button class="nav-btn" onclick="goScreen('manage')" id="nav-manage"><span class="icon">⚙️</span>Manage</button>
    <button class="nav-btn" onclick="goScreen('leave')" id="nav-leave"><span class="icon">🌴</span>Leave</button>
    <button class="nav-btn" onclick="goScreen('office')" id="nav-office"><span class="icon">🏢</span>Office</button>
    <button class="nav-btn" onclick="goScreen('pdf')" id="nav-pdf"><span class="icon">📄</span>Report</button>
  </div>
</div>

<!-- VENUES SCREEN -->
<div class="screen active" id="screen-venues">
  <div style="margin-bottom:10px;" id="venue-search-wrap">
    <input class="sbar" placeholder="Search venues..." oninput="renderVenues()" id="venue-search"/>
  </div>
  <div class="drag-tip">☝️ Tap a venue to open it and assign staff</div>
  <div id="venues-list"></div>
</div>

<!-- VENUE DETAIL SCREEN -->
<div class="screen" id="screen-venueDetail">
  <div class="detail-header">
    <button class="back-btn" onclick="goScreen('venues')">‹ Back</button>
    <div style="flex:1;min-width:0;">
      <div class="detail-title" id="detail-title"></div>
      <div class="detail-meta" id="detail-meta"></div>
    </div>
    <button class="clear-btn" id="clear-venue-btn" onclick="clearActiveVenue()">Clear All</button>
  </div>
  <div class="drop-zone" id="main-drop-zone">⬇ Drop staff here or tap "+ Add" below</div>
  <div id="assigned-section"></div>
  <div class="section">
    <div class="section-title">ADD STAFF TO THIS VENUE</div>
    <input class="sbar" placeholder="Search staff..." oninput="renderAddStaff()" id="add-staff-search"/>
    <div class="role-filters" id="role-filters"></div>
    <div id="add-staff-list"></div>
  </div>
</div>

<!-- MANAGE SCREEN -->
<div class="screen" id="screen-manage">
  <div class="sub-tabs">
    <button class="sub-tab active" onclick="manageTab('staff')" id="mtab-staff">👥 Staff</button>
    <button class="sub-tab" onclick="manageTab('venues')" id="mtab-venues">🏨 Venues</button>
    <button class="sub-tab" onclick="manageTab('cats')" id="mtab-cats">🏷️ Roles</button>
  </div>
  <div id="manage-staff-panel">
    <div class="add-box">
      <div class="add-box-title">➕ Add New Staff Member</div>
      <input class="input-field" placeholder="Full Name" id="new-staff-name"/>
      <select class="select-field" id="new-staff-role"></select>
      <button class="add-big-btn" onclick="addStaff()">+ Add Staff Member</button>
    </div>
    <input class="sbar" placeholder="Search staff..." oninput="renderManageStaff()" id="manage-staff-search"/>
    <div id="manage-staff-list"></div>
  </div>
  <div id="manage-venues-panel" class="hidden">
    <div class="add-box">
      <div class="add-box-title">➕ Add New Venue</div>
      <input class="input-field" placeholder="Venue Name (e.g. Taj Hotel, Delhi)" id="new-venue-name"/>
      <button class="add-big-btn" onclick="addVenue()">+ Add Venue</button>
    </div>
    <input class="sbar" placeholder="Search venues..." oninput="renderManageVenues()" id="manage-venue-search"/>
    <div id="manage-venues-list"></div>
  </div>
  <div id="manage-cats-panel" class="hidden">
    <div class="add-box">
      <div class="add-box-title">➕ Add New Role / Category</div>
      <input class="input-field" placeholder="e.g. Sound Technician, Rigger..." id="new-cat-name"/>
      <button class="add-big-btn" onclick="addCategory()">+ Add Category</button>
    </div>
    <div id="manage-cats-list"></div>
  </div>
</div>

<!-- LEAVE SCREEN -->
<div class="screen" id="screen-leave">
  <div class="leave-header" style="background:#fff5f5;border-color:#ffcdd2;">
    <span style="font-size:30px">🌴</span>
    <div>
      <div class="leave-title" style="color:#c62828;">On Leave</div>
      <div style="font-size:13px;color:#555;" id="leave-count">0 staff marked</div>
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:10px;">
    <button class="toggle-btn active" onclick="leaveTab('avail')" id="ltab-avail" style="flex:1;background:#c62828;color:#fff;border-color:#c62828;">Available</button>
    <button class="toggle-btn" onclick="leaveTab('marked')" id="ltab-marked" style="flex:1;color:#c62828;border-color:#c62828;">Marked</button>
  </div>
  <input class="sbar" placeholder="Search staff..." oninput="renderLeave()" id="leave-search"/>
  <div id="leave-list"></div>
</div>

<!-- OFFICE SCREEN -->
<div class="screen" id="screen-office">
  <div class="leave-header" style="background:#fff8f0;border-color:#ffe0b2;">
    <span style="font-size:30px">🏢</span>
    <div>
      <div class="leave-title" style="color:#e65100;">In Office</div>
      <div style="font-size:13px;color:#555;" id="office-count">0 staff marked</div>
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:10px;">
    <button class="toggle-btn active" onclick="officeTab('avail')" id="otab-avail" style="flex:1;background:#e65100;color:#fff;border-color:#e65100;">Available</button>
    <button class="toggle-btn" onclick="officeTab('marked')" id="otab-marked" style="flex:1;color:#e65100;border-color:#e65100;">Marked</button>
  </div>
  <input class="sbar" placeholder="Search staff..." oninput="renderOffice()" id="office-search"/>
  <div id="office-list"></div>
</div>

<!-- PDF SCREEN -->
<div class="screen" id="screen-pdf">
  <div class="pdf-header">
    <span style="font-size:32px">📋</span>
    <div>
      <div class="pdf-title">Duty Deployment Report</div>
      <div style="font-size:13px;color:#1565c0;font-weight:600;margin-top:2px;" id="pdf-duty-date"></div>
      <div style="font-size:11px;color:#888;" id="pdf-prep-date"></div>
    </div>
  </div>
  <div class="summary-box" id="pdf-summary"></div>
  <div id="pdf-venue-list"></div>
  <button class="pdf-btn" onclick="downloadReport()">⬇ Download Report</button>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
var staff = [];
var venues = [];
var categories = ["Sound Engineer","Lighting Tech","AV Tech","Stage Manager","Camera Operator","Video Tech","Crew Lead","Setup Specialist","Live Stream Tech","Projection Tech","DJ Operator","Truss Rigger"];
var assignments = {}; // venueId -> { empId -> {emp, timeIn, timeOut} }
var onLeave = {};     // empId -> {emp, timeIn, timeOut}
var inOffice = {};    // empId -> {emp, timeIn, timeOut}
var activeVenueId = null;
var activeRoleFilter = "All";
var leaveShowTab = "avail";
var officeShowTab = "avail";
var manageShowTab = "staff";

var CAT_COLORS = ["#1565c0","#6a1b9a","#0277bd","#1b5e20","#b71c1c","#880e4f","#e65100","#00695c","#33691e","#4527a0","#c62828","#4e342e","#00796b","#ad1457","#283593","#558b2f","#0288d1","#7b1fa2","#2e7d32"];
var TIME_SLOTS = ["6:00 AM","7:00 AM","8:00 AM","9:00 AM","10:00 AM","11:00 AM","12:00 PM","1:00 PM","2:00 PM","3:00 PM","4:00 PM","5:00 PM","6:00 PM","7:00 PM","8:00 PM","9:00 PM","10:00 PM","11:00 PM"];

function makeId(){ return Math.random().toString(36).slice(2,9); }
function catColor(cat){ var i=categories.indexOf(cat); return CAT_COLORS[i>=0?i%CAT_COLORS.length:0]||"#1565c0"; }
function initials(name){ var p=name.trim().split(" "); return p[0][0]+(p[1]?p[1][0]:""); }

function nextDay(d){
  var dt=new Date(d); dt.setDate(dt.getDate()+1);
  return dt.toISOString().slice(0,10);
}
function fmtDate(d){
  var dt=new Date(d);
  return dt.toLocaleDateString("en-IN",{day:"numeric",month:"long",year:"numeric"});
}

// date
var today = new Date().toISOString().slice(0,10);
document.getElementById("date-input").value = today;
document.getElementById("date-input").addEventListener("change", function(){ renderAll(); });

function getDate(){ return document.getElementById("date-input").value || today; }

// ── Toast ─────────────────────────────────────────────────────────────────────
var toastTimer;
function showToast(msg, type){
  var el=document.getElementById("toast");
  el.textContent=msg;
  el.style.background=type==="err"?"#c62828":type==="warn"?"#e65100":"#1b5e20";
  el.style.display="block";
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){el.style.display="none";},2500);
}

// ── Navigation ────────────────────────────────────────────────────────────────
function goScreen(name){
  document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");});
  document.querySelectorAll(".nav-btn").forEach(function(b){b.classList.remove("active");});
  var s=document.getElementById("screen-"+name);
  if(s)s.classList.add("active");
  var n=document.getElementById("nav-"+name.replace("venueDetail","venues"));
  if(n)n.classList.add("active");
  if(name==="venues")renderVenues();
  if(name==="venueDetail")renderVenueDetail();
  if(name==="manage")renderManage();
  if(name==="leave")renderLeave();
  if(name==="office")renderOffice();
  if(name==="pdf")renderPDF();
  renderStats();
}

function renderAll(){renderStats();if(activeVenueId)renderVenueDetail();}

// ── Stats ─────────────────────────────────────────────────────────────────────
function getAssignedIds(){
  var ids=[];
  Object.values(assignments).forEach(function(vm){Object.keys(vm).forEach(function(id){ids.push(id);});});
  return ids;
}
function renderStats(){
  var aIds=getAssignedIds();
  var lIds=Object.keys(onLeave);
  var oIds=Object.keys(inOffice);
  var free=staff.length-aIds.length-lIds.length-oIds.length;
  var bar=document.getElementById("stats-bar");
  bar.innerHTML=
    chip("Staff",staff.length,"#1565c0")+
    chip("Deployed",aIds.length,"#1b5e20")+
    chip("Leave",lIds.length,"#c62828")+
    chip("Office",oIds.length,"#e65100")+
    chip("Free",free<0?0:free,"#4527a0");
}
function chip(label,val,color){
  return '<div class="stat-chip" style="border:1.5px solid '+color+'44;">'+
    '<div class="stat-val" style="color:'+color+'">'+val+'</div>'+
    '<div class="stat-label">'+label+'</div></div>';
}

// ── Venues Screen ─────────────────────────────────────────────────────────────
function renderVenues(){
  var search=(document.getElementById("venue-search")||{}).value||"";
  var list=document.getElementById("venues-list");
  var filtered=venues.filter(function(v){return v.name.toLowerCase().includes(search.toLowerCase());});
  if(venues.length===0){
    list.innerHTML='<div class="empty-state"><div class="ei">🏨</div><div class="et">No Venues Yet</div><div class="es">Go to Manage tab to add venues</div></div>';
    return;
  }
  var html="";
  filtered.forEach(function(venue,i){
    var team=getVenueTeam(venue.id);
    var preview="";
    team.slice(0,5).forEach(function(a){
      var c=catColor(a.emp.role);
      preview+='<span class="preview-chip" style="color:'+c+';background:'+c+'18;border:1px solid '+c+'33">'+a.emp.name.split(" ")[0]+'</span>';
    });
    if(team.length>5)preview+='<span style="font-size:11px;color:#888">+' +(team.length-5)+' more</span>';
    html+='<div class="vcard" onclick="openVenue(\''+venue.id+'\')">'+
      '<div class="vcard-top">'+
        '<div class="vnum">V'+(i+1)+'</div>'+

  var rfHtml='<button class="role-pill'+(activeRoleFilter==="All"?" active":"")+'" style="'+(activeRoleFilter==="All"?"background:#1565c0;color:#fff;border:none;":"")+'" onclick="setRoleFilter(\'All\')">All</button>';

function renderAddStaff(){
  var search=(document.getElementById("add-staff-search")||{}).value||"";
  var aIds=getAssignedIds();
  var lIds=Object.keys(onLeave);
  var oIds=Object.keys(inOffice);
  var avail=staff.filter(function(e){
    return !aIds.includes(e.id)&&!lIds.includes(e.id)&&!oIds.includes(e.id)&&
      e.name.toLowerCase().includes(search.toLowerCase())&&
      (activeRoleFilter==="All"||e.role===activeRoleFilter);
  });
  var html="";
  if(staff.length===0){html='<div class="empty">No staff added yet. Go to Manage tab.</div>';}
  else if(avail.length===0){html='<div class="empty">No available staff matching filters.</div>';}
  else{
    avail.forEach(function(emp){
      var c=catColor(emp.role);
      var ini=initials(emp.name);
      html+='<div class="staff-row" ontouchstart="touchStart(event,\''+emp.id+'\')" onclick="assignEmp(\''+emp.id+'\')">'+
        '<div class="emp-avatar" style="background:'+c+'18;color:'+c+';border:2px solid '+c+'33">'+ini+'</div>'+
        '<div style="flex:1;min-width:0"><div class="emp-name">'+esc(emp.name)+'</div><div class="emp-role" style="color:'+c+'">'+esc(emp.role)+'</div></div>'+
        '<button class="add-btn" onclick="event.stopPropagation();assignEmp(\''+emp.id+'\')">+ Add</button>'+
      '</div>';
    });
  }
  document.getElementById("add-staff-list").innerHTML=html;
}

function setRoleFilter(r){ activeRoleFilter=r; renderVenueDetail(); }

function assignEmp(empId){
  var emp=staff.find(function(e){return e.id===empId;});
  if(!emp||!activeVenueId)return;
  if(!assignments[activeVenueId])assignments[activeVenueId]={};
  // remove from other venues
  Object.keys(assignments).forEach(function(vid){if(assignments[vid][empId])delete assignments[vid][empId];});
  // remove from leave/office
  delete onLeave[empId]; delete inOffice[empId];
  assignments[activeVenueId][empId]={emp:emp,timeIn:"6:00 AM",timeOut:"6:00 AM"};
  var venue=venues.find(function(v){return v.id===activeVenueId;});
  showToast(emp.name+" → "+(venue?venue.name:"venue"));
  renderVenueDetail(); renderStats();
}

function removeFromVenue(empId,venueId){
  if(assignments[venueId])delete assignments[venueId][empId];
  renderVenueDetail(); renderStats();
}

function clearActiveVenue(){
  if(activeVenueId)assignments[activeVenueId]={};
  showToast("Venue cleared","warn");
  renderVenueDetail(); renderStats();
}

function updateVenueTiming(empId,venueId,field,val){
  if(assignments[venueId]&&assignments[venueId][empId])assignments[venueId][empId][field]=val;
}

        '<span style="font-size:11px;color:'+c+';background:'+c+'18;border-radius:4px;padding:1px 6px;">'+esc(a.emp.role)+'</span></div>'+

        '<div style="font-size:10px;color:#888">to</div><div style="font-size:12px;font-weight:700;color:#e65100">'+a.timeOut+'</div></div></div>';
    });
    html+='</div>';
  }

  if(activeV.length===0&&lList.length===0&&oList.length===0){
    html='<div class="empty">No staff deployed yet.</div>';
  }
  document.getElementById("pdf-venue-list").innerHTML=html;
}

function downloadReport(){
  var d=getDate(); var nd=nextDay(d);
  var aIds=getAssignedIds();
  var lList=Object.values(onLeave); var oList=Object.values(inOffice);
  var lines=["GROVER AUDIO SERVICES","Staff Duty Deployment Report",
    "Duty Date: "+fmtDate(nd),"Prepared: "+fmtDate(d),
    "================================================",
    "TOTAL DEPLOYED: "+aIds.length+" | LEAVE: "+lList.length+" | OFFICE: "+oList.length,
    "================================================"];
  var vc=0;
  venues.forEach(function(venue){
    var team=getVenueTeam(venue.id);
    if(!team.length)return;
    vc++;
    lines.push("","VENUE "+vc+": "+venue.name,"Total Staff: "+team.length,"------------------------------------------------");
    team.forEach(function(a,i){lines.push((i+1)+". "+a.emp.name+" | "+a.emp.role+" | Duty: "+a.timeIn+" to "+a.timeOut);});
  });
  if(lList.length){lines.push("","ON LEAVE","------------------------------------------------");lList.forEach(function(a,i){lines.push((i+1)+". "+a.emp.name+" | "+a.emp.role+" | "+a.timeIn+" to "+a.timeOut);});}
  if(oList.length){lines.push("","IN OFFICE","------------------------------------------------");oList.forEach(function(a,i){lines.push((i+1)+". "+a.emp.name+" | "+a.emp.role+" | "+a.timeIn+" to "+a.timeOut);});}
  lines.push("","================================================","Generated by Grover Audio Services");
  var blob=new Blob([lines.join("\n")],{type:"text/plain"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");a.href=url;a.download="GAS_Duty_"+nd+".txt";a.click();
  URL.revokeObjectURL(url);
  showToast("Report downloaded!");
}

// ── Touch Drag & Drop ─────────────────────────────────────────────────────────
var dragEmpId=null, ghostEl=null;
function touchStart(e,empId){
  dragEmpId=empId;
  var t=e.touches[0];
  var emp=staff.find(function(x){return x.id===empId;});
  if(!emp)return;
  var c=catColor(emp.role);
  var ini=initials(emp.name);
  ghostEl=document.createElement("div");
  ghostEl.className="ghost";
  ghostEl.style.left=(t.clientX-110)+"px";
  ghostEl.style.top=(t.clientY-30)+"px";
  ghostEl.innerHTML='<div style="background:#fff;border:2px solid '+c+';border-radius:10px;padding:8px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 6px 24px rgba(0,0,0,0.18);font-family:sans-serif">'+
    '<div style="width:32px;height:32px;border-radius:7px;background:'+c+'22;color:'+c+';display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px">'+ini+'</div>'+
    '<div><div style="font-size:13px;font-weight:700;color:#111">'+esc(emp.name)+'</div><div style="font-size:10px;color:'+c+'">'+esc(emp.role)+'</div></div></div>';
  document.body.appendChild(ghostEl);
  if(navigator.vibrate)navigator.vibrate(30);
  e.stopPropagation();
}
document.addEventListener("touchmove",function(e){
  if(!dragEmpId||!ghostEl)return;
  e.preventDefault();
  var t=e.touches[0];
  ghostEl.style.left=(t.clientX-110)+"px";
  ghostEl.style.top=(t.clientY-30)+"px";
  var dz=document.getElementById("main-drop-zone");
  if(dz){var r=dz.getBoundingClientRect();dz.classList.toggle("over",t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom);}
},{passive:false});
document.addEventListener("touchend",function(e){
  if(!dragEmpId){if(ghostEl){try{document.body.removeChild(ghostEl);}catch(x){}ghostEl=null;}return;}
  var t=e.changedTouches[0];
  var dz=document.getElementById("main-drop-zone");
  var dropped=false;
  if(dz){var r=dz.getBoundingClientRect();if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){assignEmp(dragEmpId);dropped=true;}}
  if(dz)dz.classList.remove("over");
  if(ghostEl){try{document.body.removeChild(ghostEl);}catch(x){}ghostEl=null;}
  if(dropped&&navigator.vibrate)navigator.vibrate([20,10,20]);
  dragEmpId=null;
});

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

renderStats();
renderVenues();
